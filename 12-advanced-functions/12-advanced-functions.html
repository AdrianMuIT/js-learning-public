<html lang="en">
<head>
  <title> Arrays and Loops </title>
</head>
<body>

  <button onclick="" class="js-button">Click</button>


  <script>
    function greeting() {
      console.log('hello');
    }

    greeting();


    const num = 2;
    const function1 = function() {
      console.log('hello2');
    };

    console.log(function1); //will return code that is in the variable
    console.log(typeof function1); //will return 'function'
    function1();    //this is how we call it


    //well, functions are values - values can be saved in variables and objects
    //which means we can save variable (that value = function) into an object
    const object1 = {
      num: 2,
      fun: function() {
        console.log('hello3');
      }
    };

    object1.fun();


    //What else can we do with value?
    //we can pass value into a funtion

    //Passing a value into the functions
    function display(parameter) {
      console.log(parameter);
    }

    display('lol');

    //Bacause functions are values
    //we can pass function into the function

    //Passing a function into another functiuon
    function run(param) {
      param();
    }

    run(function () {
      console.log('hello4');  //we call it; call-back function
    });


    //Practical Examples
    //setTimeout()

    /*
    // setTimeout(); //takes two parameters (function, time)
    setTimeout(function() {
      console.log('timeout');
    }, 3000);


    //Asynchronous Code
    console.log('next line');


    //setInterval
    setInterval(function() {
      console.log('interval');
    }, 3000);
    */

    const arr1 = [
      'make dinner',
      'wash dishes',
      'watch youtube'
    ];
    
    arr1.forEach(function (value, index) {
      console.log(value, index);
    });


    const arr2 = [
      'make dinner',
      'wash dishes',
      'watch youtube'
    ];
    
    arr2.forEach(function (value, index) {
      if (value === 'wash dishes') {
        return;           //it does the same as continue, but in forEach
      }                   //we use return, if we need to use break - its better to use for loop

      console.log(index);
      console.log(value);
    });


    //ARROW FUNCTIONS 
    const regularFunction = function(param, param2) {
      console.log('hello');
      return 5;
    };

    const arrowFunction = (param, param2) => {
      console.log('hello');
      return 5;
    };

    arrowFunction();


    //example of differences vs regular function
    //In one parameter no need to use ()
    const oneParam = param => {
      console.log(param + 1);
    };

    oneParam(2); // output: 3

    //example two - one line arrow function
    //we can remove square brackets and return
    const oneLine = () => 2 + 3;

    console.log(oneLine()); //output 5


    //foreach with arrow function 
    const arr3 = [
      'make dinner',
      'wash dishes',
      'watch youtube'
    ];

    arr3.forEach((value, index) => {
      if (value === 'wash dishes') {
        return;
      }

      console.log(value, index);
    });

    //Array functions inside the object
    const object2 = {
      method: () => {

      },
      method() {    //we use this syntax for function in object

      }
    };


    //addEventListener() and .removeEventListener
    const buttonElement = document.querySelector('.js-button');
    const eventListener = () => {
      console.log('click');
    };

    buttonElement.addEventListener('click', eventListener);

    buttonElement.removeEventListener('click', eventListener);
    
    buttonElement.addEventListener('click',() => {
      console.log('click2');
    });

    ////////////////////////////////////////////////////
    //.fiter()  --array method 

    const arr5 = [1, -3, 5].filter((value, index) => {
      return true;  
    }); //works the same as for each, but this time it will return a value

    console.log([1, -3, 5].filter((value, index) => {
      return true; // it will log [1, -3, 5] - because we set true for each interetion 
    })); 

    console.log([1, -3, 5].filter((value, index) => {
      if (value >= 0) {
        return true;
      } else {
        return false;
      }
    })); // it will return an array [1, 5] - because true is only for value => 0

    console.log([1, -3, 5].filter((value, index) => {
      return value >= 0;     
    })); // it will return an array [1, 5] - because true is only for value => 0



    //.map() --array method

    console.log([1, 1, 3].map((value, index) => {
      return 10;   //it will return [10, 10, 10] - each value becomes 10
    }));

     console.log([1, 1, 3].map((value, index) => {
      return value + 10;   //it will add 10 to each value
    }));

    ///////////////////////////////////

    //shortcuts for array functions - both codes do the same thing, but 2nd one is with shortcuts
     console.log([1, 1, 3].map((value, index) => {
      return value * 2;   
    }));

    console.log([1, 1, 3].map(value => value * 2)); 
  
  </script>
</body>
</html>
